<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification</title>
</head>
<body>
    <h1>Age Verification</h1>
    <p>
        Name: {{ name }}<br>
        Age: {{ age }}

    </p>
    <!-- Template Logic -->
    <p>
        {% if age >= 18 %}
        {{ name }} is an adult
        {% else %}
        {{ name }} is a minor
        {% endif %}
    </p>
</body>
</html>
